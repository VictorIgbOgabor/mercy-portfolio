<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1A1410;--paper:#FAF8F5;--blush:#C4856A;--sage:#4A6741;
  --gold:#B8924A;--mist:#E8E4DF;--caption:#7A7470;--navy:#1B2A4A;
}
html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;overflow-x:hidden;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--mist);}
::-webkit-scrollbar-thumb{background:var(--blush);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(250,248,245,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--mist);transition:all 0.3s;}
nav.scrolled{padding:0.75rem 2rem;box-shadow:0 2px 20px rgba(0,0,0,0.08);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;letter-spacing:0.04em;color:var(--ink);text-decoration:none;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--caption);text-decoration:none;transition:color 0.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--blush);transition:width 0.3s;}
.nav-links a:hover{color:var(--blush);}
.nav-links a:hover::after{width:100%;}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;z-index:1001;}
.hamburger span{display:block;width:24px;height:2px;background:var(--ink);transition:all 0.3s;}
.hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.active span:nth-child(2){opacity:0;}
.hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* MOBILE MENU */
.mobile-menu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--paper);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.mobile-menu.open{opacity:1;pointer-events:all;}
.mobile-menu a{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--ink);text-decoration:none;letter-spacing:0.05em;transition:color 0.2s;}
.mobile-menu a:hover{color:var(--blush);}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:5rem;position:relative;overflow:hidden;}

/* BG PATTERN */
.hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px, rgba(196,133,106,0.12) 1px, transparent 0);background-size:32px 32px;pointer-events:none;}

.hero-left{display:flex;flex-direction:column;justify-content:center;padding:4rem 3rem 4rem 5rem;position:relative;z-index:1;}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--blush);margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.6s 0.2s forwards;}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,5vw,4.5rem);font-weight:300;line-height:1.05;margin-bottom:0.5rem;opacity:0;animation:fadeUp 0.6s 0.35s forwards;}
.hero-name em{font-style:italic;color:var(--blush);}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;color:var(--sage);margin-bottom:2rem;font-style:italic;opacity:0;animation:fadeUp 0.6s 0.5s forwards;}
.hero-bio{font-size:0.92rem;color:var(--caption);max-width:420px;line-height:1.85;margin-bottom:2.5rem;opacity:0;animation:fadeUp 0.6s 0.65s forwards;}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp 0.6s 0.8s forwards;}

.hero-right{background:var(--sage);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.hero-right::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;border:1px solid rgba(255,255,255,0.08);top:50%;left:50%;transform:translate(-50%,-50%);}
.hero-right::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);top:50%;left:50%;transform:translate(-50%,-50%);}

/* PROFILE PHOTO */
.photo-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:2rem;}
.photo-ring{position:relative;width:260px;height:260px;opacity:0;animation:fadeIn 1s 0.4s forwards;}
.photo-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);animation:spin 12s linear infinite;}
.photo-ring::after{content:'';position:absolute;inset:-16px;border-radius:50%;border:1px dashed rgba(255,255,255,0.15);animation:spin 20s linear infinite reverse;}
.photo-img{width:260px;height:260px;border-radius:50%;object-fit:cover;object-position:top;border:4px solid rgba(255,255,255,0.9);box-shadow:0 20px 60px rgba(0,0,0,0.3);}

.stat-pills{display:flex;flex-direction:column;gap:0.75rem;opacity:0;animation:fadeUp 0.6s 0.9s forwards;}
.stat-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);padding:0.75rem 1.5rem;display:flex;align-items:center;gap:1rem;backdrop-filter:blur(4px);}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:white;line-height:1;}
.stat-label{font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.6);}

/* BUTTONS */
.btn-primary{background:var(--blush);color:white;padding:0.85rem 2rem;border:none;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all 0.25s;display:inline-block;}
.btn-primary:hover{background:#b07458;transform:translateY(-2px);box-shadow:0 8px 20px rgba(196,133,106,0.35);}
.btn-outline{border:1px solid var(--ink);color:var(--ink);padding:0.85rem 2rem;font-family:'DM Sans',sans-serif;font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:all 0.25s;background:transparent;cursor:pointer;display:inline-block;}
.btn-outline:hover{background:var(--ink);color:var(--paper);transform:translateY(-2px);}

/* SECTION */
section{padding:5rem;}
.section-label{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--blush);margin-bottom:1rem;}
.section-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,3.5vw,3rem);font-weight:300;line-height:1.15;margin-bottom:1rem;}
.section-heading em{font-style:italic;color:var(--sage);}
.divider{width:48px;height:2px;background:var(--blush);margin:1.25rem 0 2rem;}

/* REVEAL ANIMATION */
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* SERVICES */
#services{background:var(--ink);position:relative;overflow:hidden;}
#services::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.03) 1px,transparent 0);background-size:28px 28px;pointer-events:none;}
#services .section-label{color:var(--gold);}
#services .section-heading{color:var(--paper);}
#services .section-heading em{color:var(--blush);}
.services-intro{color:rgba(250,248,245,0.5);font-size:0.92rem;max-width:480px;line-height:1.85;margin-bottom:3rem;}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:rgba(255,255,255,0.06);}
.service-item{background:var(--ink);padding:2rem 1.75rem;border:1px solid rgba(255,255,255,0.05);transition:all 0.3s;cursor:default;position:relative;overflow:hidden;}
.service-item::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--blush);transform:scaleX(0);transition:transform 0.3s;}
.service-item:hover{background:#26201A;}
.service-item:hover::before{transform:scaleX(1);}
.service-icon{font-size:1.6rem;margin-bottom:1rem;display:block;}
.service-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--paper);margin-bottom:0.5rem;}
.service-desc{font-size:0.82rem;color:rgba(250,248,245,0.4);line-height:1.75;}

/* ABOUT */
#about{background:var(--mist);position:relative;overflow:hidden;}
#about::after{content:'MERCY';position:absolute;right:-2rem;bottom:-2rem;font-family:'Cormorant Garamond',serif;font-size:10rem;font-weight:600;color:rgba(74,103,65,0.05);pointer-events:none;line-height:1;}
.about-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:4rem;align-items:center;margin-top:2rem;}
.about-box{background:var(--sage);padding:3rem 2.5rem;color:white;}
.about-box-quote{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-style:italic;font-weight:300;line-height:1.5;margin-bottom:1.5rem;}
.about-box-meta{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.55);}
.about-detail p{font-size:0.92rem;color:var(--caption);line-height:1.9;margin-bottom:1.25rem;}
.edu-tag{display:inline-flex;align-items:center;gap:0.5rem;background:white;border:1px solid var(--mist);padding:0.6rem 1rem;margin-top:1rem;font-size:0.8rem;color:var(--ink);}
.edu-tag strong{font-weight:500;}

/* CERTS */
#certs{background:var(--paper);}
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;margin-top:2.5rem;}
.cert-card{border:1px solid var(--mist);padding:1.75rem 1.5rem;transition:all 0.3s;background:white;position:relative;overflow:hidden;}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blush),var(--gold));transform:scaleX(0);transition:transform 0.3s;}
.cert-card:hover{border-color:transparent;transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.1);}
.cert-card:hover::before{transform:scaleX(1);}
.cert-org{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--blush);margin-bottom:0.6rem;}
.cert-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:var(--ink);line-height:1.3;margin-bottom:0.4rem;}
.cert-date{font-size:0.72rem;color:var(--caption);}
.cert-badge{display:inline-block;margin-top:1rem;padding:0.25rem 0.6rem;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--mist);color:var(--sage);font-weight:500;}

/* WHY */
#why{background:var(--navy);color:white;position:relative;overflow:hidden;}
#why::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.04) 1px,transparent 0);background-size:24px 24px;pointer-events:none;}
#why .section-label{color:rgba(196,133,106,0.8);}
#why .section-heading{color:white;}
#why .section-heading em{color:var(--blush);font-style:italic;}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2rem;margin-top:2.5rem;}
.why-item{border-top:1px solid rgba(255,255,255,0.15);padding-top:1.5rem;}
.why-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:rgba(255,255,255,0.12);line-height:1;margin-bottom:0.5rem;}
.why-title{font-size:0.82rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.5rem;color:white;}
.why-desc{font-size:0.83rem;color:rgba(255,255,255,0.5);line-height:1.75;}

/* CONTACT */
#contact{background:var(--paper);position:relative;overflow:hidden;}
#contact::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(196,133,106,0.08) 1px,transparent 0);background-size:32px 32px;pointer-events:none;}
.contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:4rem;margin-top:2.5rem;align-items:start;position:relative;z-index:1;}
.contact-intro{font-size:0.92rem;color:var(--caption);line-height:1.85;}
.contact-links{margin-top:2rem;display:flex;flex-direction:column;gap:0;}
.contact-link{display:flex;align-items:center;gap:0.75rem;font-size:0.86rem;color:var(--ink);text-decoration:none;padding:1rem 0;border-bottom:1px solid var(--mist);transition:all 0.2s;}
.contact-link:hover{color:var(--blush);padding-left:0.5rem;}
.contact-link-icon{font-size:1rem;width:24px;text-align:center;}
.contact-form{display:flex;flex-direction:column;gap:1rem;}
.form-field{display:flex;flex-direction:column;gap:0.35rem;}
.form-label{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--caption);}
.form-input,.form-textarea{border:1px solid var(--mist);background:white;padding:0.85rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus,.form-textarea:focus{border-color:var(--blush);}
.form-textarea{resize:vertical;min-height:130px;}

/* FOOTER */
footer{background:var(--ink);color:rgba(250,248,245,0.35);padding:2rem 5rem;display:flex;align-items:center;justify-content:space-between;font-size:0.75rem;letter-spacing:0.05em;}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;color:rgba(250,248,245,0.65);font-weight:300;}

/* WHATSAPP BUTTON */
.wa-btn{position:fixed;bottom:2rem;right:2rem;z-index:900;background:#25D366;color:white;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:all 0.3s;animation:pulse 2.5s infinite;}
.wa-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,0.55);}
.wa-btn svg{width:28px;height:28px;fill:white;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,0.4);}50%{box-shadow:0 4px 32px rgba(37,211,102,0.7);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

.photo-ring{animation:fadeIn 1s 0.4s forwards, float 4s 1.4s ease-in-out infinite;}

/* RESPONSIVE */
@media(max-width:900px){
  .hero{grid-template-columns:1fr;min-height:auto;}
  .hero-left{padding:6rem 1.5rem 3rem;}
  .hero-right{min-height:400px;padding:2rem 1.5rem;}
  .photo-wrap{flex-direction:row;flex-wrap:wrap;justify-content:center;}
  .photo-ring{width:180px;height:180px;}
  .photo-img{width:180px;height:180px;}
  .stat-pills{flex-direction:row;flex-wrap:wrap;justify-content:center;}
  .stat-pill{padding:0.6rem 1rem;}
  section{padding:3rem 1.5rem;}
  .about-grid,.contact-wrap{grid-template-columns:1fr;gap:2rem;}
  #about::after{font-size:5rem;}
  nav{padding:1rem 1.5rem;}
  .nav-links{display:none;}
  .hamburger{display:flex;}
  .mobile-menu{display:flex;}
  footer{flex-direction:column;gap:0.75rem;text-align:center;padding:2rem 1.5rem;}
}
@media(max-width:480px){
  .hero-name{font-size:2.5rem;}
  .services-grid{grid-template-columns:1fr;}
  .certs-grid{grid-template-columns:1fr;}
  .why-grid{grid-template-columns:1fr 1fr;}
  .hero-cta{flex-direction:column;}
  .btn-primary,.btn-outline{text-align:center;}
}
</style>

    <div class="about-detail reveal">
      <p>Ogabor Mercy Akpana is a trained educator and certified professional Virtual Assistant based in Nigeria. She holds a degree in Special Education from the prestigious University of Ibadan — a foundation that sharpened her communication skills, patience, and ability to tailor her approach to each individual's needs.</p>
      <p>Over the past two years, Mercy has invested heavily in professional development, earning certifications across HR management (in collaboration with SHRM Global), project management, digital marketing, customer relationship management, virtual assistance, entrepreneurship, and public speaking.</p>
      <p>She is accredited through the Quality Management Career Centre (QMCC), which holds recognition from the Centre for Management Development (CMD) and the National Board for Technical Education (NBTE).</p>

<script>
// NAV SCROLL
window.addEventListener('scroll',()=>{
  document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>50);
});

// HAMBURGER
const hamburger=document.getElementById('hamburger');
const mobileMenu=document.getElementById('mobileMenu');
hamburger.addEventListener('click',()=>{
  hamburger.classList.toggle('active');
  mobileMenu.classList.toggle('open');
  document.body.style.overflow=mobileMenu.classList.contains('open')?'hidden':'';
});
document.querySelectorAll('.menu-link').forEach(link=>{
  link.addEventListener('click',()=>{
    hamburger.classList.remove('active');
    mobileMenu.classList.remove('open');
    document.body.style.overflow='';
  });
});

// SCROLL REVEAL
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');}});
},{threshold:0.12});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
</script>
